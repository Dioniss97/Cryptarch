version: "3.9"
services:
  web:
    image: node:20-alpine
    working_dir: /workspace/apps/web
    command: sh -c "npm install && npm run dev"
    volumes: ["../:/workspace", "web_node_modules:/workspace/apps/web/node_modules"]
    ports: ["3000:3000"]
    depends_on: [api]
  api:
    image: python:3.11-slim
    working_dir: /workspace/apps/api
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    volumes: ["../:/workspace"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/appdb
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    ports: ["8000:8000"]
    depends_on: [postgres, redis, qdrant]
  worker:
    image: python:3.11-slim
    working_dir: /workspace/workers/vectorizer
    command: sh -c "pip install -r requirements.txt && python worker.py"
    volumes: ["../:/workspace"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/appdb
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    depends_on: [postgres, redis, qdrant]
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333", "6334:6334"]
    volumes: ["qdrant_data:/qdrant/storage"]
volumes:
  pgdata:
  qdrant_data:
  web_node_modules:
